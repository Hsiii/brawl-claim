services:
  morning-dashboard:
    build: .
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 768m
    shm_size: 512mb
    env_file:
      - .env.local
    volumes:
      - morning-dashboard-state:/app/state
    networks:
      - shared

networks:
  shared:
    external: true
    name: bots_shared

volumes:
  morning-dashboard-state:

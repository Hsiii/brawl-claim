services:
  brawl-claimer:
    build: .
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 768m
    shm_size: 512mb
    env_file:
      - .env.local
    environment:
      BRAWL_STARS_CLAIMER_AUTH_STATE_FILE: /app/state/auth.json
      BRAWL_STARS_CLAIMER_DATA_DIR: /app/state
    ports:
      - "3100:3100"
    volumes:
      - brawl-claimer-state:/app/state

volumes:
  brawl-claimer-state:
